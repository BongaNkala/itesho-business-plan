<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itesho — Project Control Platform</title>
    <meta http-equiv="refresh" content="0; url=docs/business-plan.html" />
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #f97316;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            margin-top: 24px;
            font-weight: 300;
            color: #f97316;
            font-size: 24px;
            letter-spacing: 2px;
        }
        p {
            color: #888;
            margin-top: 8px;
            font-size: 14px;
        }
        a {
            color: #f97316;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>Iteshō</h1>
    <p>Loading business plan...</p>
    <p style="font-size:12px; color:#444; margin-top:16px;">
        <a href="docs/business-plan.html">Click here if you are not redirected</a>
    </p>
</body>
</html>
